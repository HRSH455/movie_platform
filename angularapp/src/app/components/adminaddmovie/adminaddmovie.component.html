<div class="form-page fade-up">
  <div class="form-card">
    <div class="form-header">
      <div class="form-icon">{{ isEditing ? '✏️' : '🎬' }}</div>
      <h2>{{ isEditing ? 'Edit Movie' : 'Add New Movie' }}</h2>
      <p>{{ isEditing ? 'Update the movie details below' : 'Fill in the details to add a new movie' }}</p>
    </div>

    <form (ngSubmit)="addOrUpdateMovie()" #movieForm="ngForm">
      <div class="form-group">
        <label for="title">Movie Title</label>
        <input type="text" id="title" name="title" [(ngModel)]="movie.title" required placeholder="e.g. The Dark Knight">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="duration">Duration (minutes)</label>
          <input type="number" id="duration" name="duration" [(ngModel)]="movie.duration" required placeholder="120">
        </div>
        <div class="form-group">
          <label for="genre">Genre</label>
          <input type="text" id="genre" name="genre" [(ngModel)]="movie.genre" required placeholder="e.g. Action">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="price">Ticket Price (₹)</label>
          <input type="number" id="price" name="price" [(ngModel)]="movie.price" required placeholder="250">
        </div>
        <div class="form-group">
          <label for="totalSeats">Total Seats</label>
          <input type="number" id="totalSeats" name="totalSeats" [(ngModel)]="movie.totalSeats" required placeholder="50">
        </div>
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="form-actions">
        <button type="button" class="btn btn-ghost" (click)="cancelOperation()">Cancel</button>
        <button type="submit" class="btn btn-gold" [disabled]="!movieForm.form.valid">
          {{ isEditing ? 'Update Movie' : 'Add Movie' }}
        </button>
      </div>
    </form>
  </div>
</div>
