<div class="movies-page fade-up">
  <div class="page-header">
    <h1>Now Showing</h1>
    <p>Pick a film and claim your seats</p>
  </div>

  <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="movies-grid">
    <div class="movie-card card" *ngFor="let movie of movies">
      <div class="movie-poster-placeholder">
        <span class="movie-initial">{{ movie.title.charAt(0) }}</span>
        <div class="genre-badge">{{ movie.genre }}</div>
      </div>
      <div class="movie-body">
        <h2 class="movie-title">{{ movie.title }}</h2>
        <div class="movie-meta">
          <span class="meta-item"><span class="meta-label">Duration</span>{{ movie.duration }} min</span>
          <span class="meta-item"><span class="meta-label">Seats</span>{{ movie.totalSeats }}</span>
        </div>
        <div class="movie-price">₹{{ movie.price }}</div>
        <button class="btn btn-gold book-btn" (click)="navigateToBooking(movie.id)">
          Book Tickets
        </button>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="movies.length === 0 && !errorMessage">
    <div class="empty-icon">🎬</div>
    <h3>No movies available</h3>
    <p>Check back soon for upcoming showings.</p>
  </div>
</div>
