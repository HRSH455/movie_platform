# ============================================
# PRODUCTION CONFIGURATION
# Activate with: java -jar app.jar --spring.profiles.active=prod
# All sensitive data injected via environment variables
# ============================================

# Database Configuration - PostgreSQL (Production)
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Server Configuration - Render assigns PORT dynamically
server.port=${PORT:8080}
app.cors.allowed-origins=https://movie-platform-five.vercel.app

# Logging Configuration - WARN level for production (reduced noise)
logging.level.root=WARN
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=WARN

# Hibernate/JPA Configuration
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.show_sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration - From environment variable
jwt.secret=${JWT_SECRET}

# Swagger Configuration
enable.swagger.plugin=true
spring.mvc.pathmatch.matching-strategy=ant-path-matcher
springdoc.swagger-ui.path=/api-docs

# File Upload Configuration
spring.servlet.multipart.max-request-size=100MB

# Application Name
spring.application.name=movie-service
