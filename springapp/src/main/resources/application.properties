# ============================================
# LOCAL DEVELOPMENT CONFIGURATION
# For production, use application-prod.properties
# ============================================

# Database Configuration - MySQL (Local Development)
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/appdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=examly

# Server Configuration
server.port=8080
app.cors.allowed-origins=http://localhost:4200

# Logging Configuration - Debug level for local development
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Hibernate/JPA Configuration
hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.show_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - Use environment variable in production
jwt.secret=${JWT_SECRET:qpwoeiru1234567890}

# Swagger Configuration
enable.swagger.plugin=true
spring.mvc.pathmatch.matching-strategy=ant-path-matcher
springdoc.swagger-ui.path=/api-docs

# File Upload Configuration
spring.servlet.multipart.max-request-size=100MB

# Application Name
spring.application.name=movie-service